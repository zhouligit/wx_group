# 域名：jiaoyou.yikuaikaixin.cn
# 用法见 deploy/DEV.md §6
#
# sudo cp deploy/nginx.jiaoyou.conf /etc/nginx/sites-available/jiaoyou
# sudo ln -sf /etc/nginx/sites-available/jiaoyou /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

upstream wx_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# 静态站点根目录（npm run build:web 产物）
root /opt/wx_group/apps/web/dist;
index index.html;

server {
    listen 80;
    listen [::]:80;
    server_name jiaoyou.yikuaikaixin.cn;

    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 微信域名验证文件
    location ~ ^/MP_verify_[A-Za-z0-9]+\.txt$ {
        default_type text/plain;
        try_files $uri =404;
    }

    # API
    location /api/ {
        proxy_pass http://wx_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA：/group/151 等深链须回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# certbot 若已生成 443，请把上面 server 块内 location 复制到 443 server，并保留 ssl 证书配置。
# 或执行 certbot 后手动合并。443 块示例：
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name jiaoyou.yikuaikaixin.cn;
#     ssl_certificate     /etc/letsencrypt/live/jiaoyou.yikuaikaixin.cn/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/jiaoyou.yikuaikaixin.cn/privkey.pem;
#     client_max_body_size 20m;
#     ... 同上 location MP_verify /api/ / ...
# }

