# 域名：jiaoyou.yikuaikaixin.cn
# 用法见 deploy/DEV.md §6
#
# sudo cp deploy/nginx.jiaoyou.conf /etc/nginx/sites-available/jiaoyou
# sudo ln -sf /etc/nginx/sites-available/jiaoyou /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# certbot 已申请证书时，把下方 ssl_certificate 路径改成实际路径（或保留 certbot 生成的 443 块，
# 但务必包含 MP_verify / api / try_files 三段 location）。

upstream wx_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

root /opt/wx_group/apps/web/dist;
index index.html;

# HTTP：微信验证文件不走 301；其余跳转 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jiaoyou.yikuaikaixin.cn;

    location ~ ^/MP_verify_[A-Za-z0-9]+\.txt$ {
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jiaoyou.yikuaikaixin.cn;

    ssl_certificate     /etc/letsencrypt/live/jiaoyou.yikuaikaixin.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiaoyou.yikuaikaixin.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location ~ ^/MP_verify_[A-Za-z0-9]+\.txt$ {
        default_type text/plain;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://wx_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
