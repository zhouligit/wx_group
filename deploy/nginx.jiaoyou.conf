# 域名：jiaoyou.yikuaikaixin.cn
# 用法见 deploy/DEV.md §6
#
# sudo cp deploy/nginx.jiaoyou.conf /etc/nginx/sites-available/jiaoyou
# sudo ln -sf /etc/nginx/sites-available/jiaoyou /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

upstream wx_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# 方案 A：反代到 vite preview（与 npm run start:bg 配套，改 PORT 时同步改这里）
upstream wx_web {
    server 127.0.0.1:5173;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name jiaoyou.yikuaikaixin.cn;

    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 微信网页授权 / JS 安全域名验证文件（须返回纯文本，不能走 SPA 回 index.html）
    location ~ ^/MP_verify_[A-Za-z0-9]+\.txt$ {
        root /opt/wx_group/apps/web/dist;
        default_type text/plain;
        try_files $uri =404;
    }

    # C 端页面（vite preview 或见下方「方案 B」静态目录）
    location / {
        proxy_pass http://wx_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://wx_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 方案 B（推荐生产）：Nginx 直接托管静态文件，注释掉上面 location / 的 proxy，改用：
#
# root /opt/wx_group/apps/web/dist;
# index index.html;
# location / {
#     try_files $uri $uri/ /index.html;
# }
#
# 此时可停止 PM2 里的 wx-web，只保留 wx-api。

