services:
  mysql:
    image: mysql:8.0
    container_name: wx_group_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: wx_group
      MYSQL_USER: wxgroup
      MYSQL_PASSWORD: wxgroup123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uwxgroup", "-pwxgroup123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wx_group_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: wx_group_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: mysql://wxgroup:wxgroup123@mysql:3306/wx_group
      REDIS_URL: redis://redis:6379
      JWT_SECRET: docker-dev-secret-change-me
      SMS_MOCK: "true"
      CORS_ORIGIN: http://localhost,http://localhost:5173,http://localhost:5174
      WEB_BASE_URL: http://localhost
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: wx_group_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./apps/admin/dist:/usr/share/nginx/admin:ro

volumes:
  mysql_data:
  redis_data:
